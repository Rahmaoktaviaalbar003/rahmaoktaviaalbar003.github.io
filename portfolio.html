<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel System Menu | Rahma Oktavia Albar</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #19171b;
            --wine-red: #5d0018;
            --maroon: #800000;
            --gold-accent: #d29f22;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            image-rendering: pixelated; 
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(45deg, #141216 25%, transparent 25%), 
                linear-gradient(-45deg, #141216 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #141216 75%), 
                linear-gradient(-45deg, transparent 75%, #141216 75%);
            background-size: 40px 40px;
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 4px solid var(--wine-red);
            background: rgba(0,0,0,0.5);
        }

        .player-info {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--gold-accent);
        }

        .headline-container {
            text-align: center;
            margin-top: 40px;
        }

        h1.headline {
            font-size: 1.5rem;
            line-height: 1.5;
            text-transform: uppercase;
            color: var(--white);
            text-shadow: 4px 4px 0px var(--wine-red);
        }

        .menu-container {
            flex: 1;
            display: flex;
            align-items: center;
            overflow-x: auto;
            padding: 0 40px;
            gap: 25px;
            scrollbar-width: none;
        }

        .menu-container::-webkit-scrollbar { display: none; }

        .menu-card {
            min-width: 220px;
            height: 300px;
            background: var(--maroon);
            border: 4px solid #000;
            box-shadow: 
                inset -4px -4px 0px 0px rgba(0,0,0,0.4),
                8px 8px 0px 0px var(--wine-red);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            transition: 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            background: var(--gold-accent);
            box-shadow: 
                inset -4px -4px 0px 0px rgba(0,0,0,0.2),
                12px 12px 0px 0px var(--white);
        }

        .menu-card h2 {
            font-size: 0.8rem;
            color: var(--white);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .menu-card p {
            font-size: 0.5rem;
            color: rgba(255,255,255,0.7);
        }

        .menu-card:hover h2, .menu-card:hover p {
            color: var(--bg-dark);
        }

        .footer-nav {
            padding: 30px 40px;
        }

        .back-btn {
            text-decoration: none;
            color: var(--white);
            font-size: 0.7rem;
            padding: 12px 20px;
            border: 4px solid var(--white);
            background: var(--bg-dark);
            box-shadow: 4px 4px 0px var(--wine-red);
            transition: 0.1s;
        }

        .back-btn:hover {
            background: var(--wine-red);
            box-shadow: 0px 0px 0px;
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body>

    <div class="hud-top">
        <div class="player-info">
            NAME: RAHMA_OKTAVIA_ALBAR
        </div>
        <div style="font-size: 0.6rem; color: #00ff00;">STATUS: ONLINE</div>
    </div>

    <div class="headline-container">
        <h1 class="headline">SELECT<br>CATEGORY</h1>
    </div>

    <div class="menu-container">
        <a href="#" class="menu-card">
            <h2>ABOUT_ME</h2>
            <p>USER PROFILE</p>
        </a>

        <a href="#" class="menu-card">
            <h2>THE_ENGINE</h2>
            <p>DATA SKILLS</p>
        </a>

        <a href="#" class="menu-card">
            <h2>CREATIVE</h2>
            <p>DESIGN LAB</p>
        </a>

        <a href="#" class="menu-card">
            <h2>SANDBOX</h2>
            <p>FUN PROJ</p>
        </a>

        <a href="#" class="menu-card">
            <h2>CONTACT</h2>
            <p>CONNECT</p>
        </a>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="back-btn">SELECT: RETURN</a>
    </div>

</body>
</html>
