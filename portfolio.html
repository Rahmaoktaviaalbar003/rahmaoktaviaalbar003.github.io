<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Menu | Rahma Oktavia Albar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-bg: #d29f22;      /* Warna Kuning Gold Utama */
            --gold-dark: #b8860b;    /* Gold lebih gelap untuk tekstur pixel */
            --wine-red: #5d0018;
            --maroon: #800000;
            --white: #ffffff;
            --bg-dark-trans: rgba(25, 23, 27, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--gold-bg);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- BACKGROUND PIXEL ART GOLD --- */
        .pixel-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Tekstur kotak-kotak pixel emas yang elegan */
            background-image: 
                linear-gradient(45deg, var(--gold-dark) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--gold-dark) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--gold-dark) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--gold-dark) 75%);
            background-size: 40px 40px;
            image-rendering: pixelated;
            z-index: -2;
            opacity: 0.3; /* Halus agar tetap elegan */
        }

        .pixel-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        /* --- HUD TOP --- */
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.85);
            border-bottom: 2px solid var(--wine-red);
            backdrop-filter: blur(10px);
        }

        .player-info {
            letter-spacing: 2px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--gold-bg);
            border-left: 3px solid var(--gold-bg);
            padding-left: 10px;
        }

        /* --- HEADLINE --- */
        .headline-container {
            text-align: center;
            margin-top: 30px;
        }

        h1.headline {
            font-family: 'Poppins', sans-serif;
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--white);
            /* Bayangan Maroon yang tajam */
            text-shadow: 3px 3px 0px var(--maroon);
        }

        /* --- MENU LAYOUT HORIZONTAL --- */
        .menu-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: auto;
            padding: 0 40px;
            gap: 20px;
            scrollbar-width: none;
        }

        .menu-container::-webkit-scrollbar { display: none; }

        .menu-card {
            min-width: 210px;
            height: 310px;
            background: var(--bg-dark-trans);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            cursor: pointer;
            text-decoration: none;
            backdrop-filter: blur(8px);
        }

        .menu-card:hover {
            transform: scale(1.05);
            border-color: var(--gold-bg);
            background: linear-gradient(to top, var(--wine-red), var(--bg-dark-trans));
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Angka Transparan di Latar Belakang Kotak */
        .menu-card::before {
            content: attr(data-number);
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: 'Poppins';
            font-size: 3.5rem;
            color: rgba(255, 255, 255, 0.05);
            font-weight: 900;
        }

        .menu-card h2 {
            font-family: 'Poppins';
            color: var(--white);
            font-size: 1.3rem;
            text-transform: uppercase;
            margin-bottom: 3px;
            z-index: 1;
        }

        .menu-card p {
            color: var(--gold-bg);
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 1;
        }

        /* Sudut Merah Khas yang Kamu Suka */
        .corner {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 25px;
            height: 25px;
            background: var(--maroon);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
        }

        .menu-card:hover .corner {
            background: var(--gold-bg);
        }

        /* --- FOOTER --- */
        .footer-nav {
            padding: 25px 40px;
            display: flex;
            justify-content: flex-start;
            background: rgba(0, 0, 0, 0.85);
        }

        .back-btn {
            text-decoration: none;
            color: var(--white);
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
            padding: 8px 25px;
            border: 1px solid var(--white);
            transition: 0.2s;
        }

        .back-btn:hover {
            background: var(--gold-bg);
            color: #000;
            border-color: var(--gold-bg);
        }

    </style>
</head>
<body>

    <div class="pixel-bg"></div>
    <div class="pixel-grid"></div>

    <div class="hud-top">
        <div class="player-info">
            <span>RAHMA OKTAVIA ALBAR</span>
        </div>
        <div style="color: var(--gold-bg); font-weight: bold; font-size: 0.8rem;">SYSTEM STATUS: ACTIVE</div>
    </div>

    <div class="headline-container">
        <h1 class="headline">Select Category</h1>
    </div>

    <div class="menu-container">
        <a href="#" class="menu-card" data-number="01">
            <div class="corner"></div>
            <h2>About Me</h2>
            <p>User Identity</p>
        </a>

        <a href="#" class="menu-card" data-number="02">
            <div class="corner"></div>
            <h2>The Engine</h2>
            <p>Data Skills</p>
        </a>

        <a href="#" class="menu-card" data-number="03">
            <div class="corner"></div>
            <h2>Creative</h2>
            <p>Design Lab</p>
        </a>

        <a href="#" class="menu-card" data-number="04">
            <div class="corner"></div>
            <h2>Sandbox</h2>
            <p>Experimental</p>
        </a>

        <a href="#" class="menu-card" data-number="05">
            <div class="corner"></div>
            <h2>Contact</h2>
            <p>Connection</p>
        </a>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="back-btn">[ ESC ] RETURN</a>
    </div>

</body>
</html>
