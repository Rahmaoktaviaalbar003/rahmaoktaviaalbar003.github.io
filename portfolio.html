<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Menu | Rahma Oktavia Albar</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-bg: #d29f22;
            --gold-dark: #b8860b;
            --wine-red: #5d0018;
            --maroon: #800000;
            --white: #ffffff;
            --black: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            image-rendering: pixelated;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--gold-bg);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .pixel-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(45deg, var(--gold-dark) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--gold-dark) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--gold-dark) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--gold-dark) 75%);
            background-size: 40px 40px;
            z-index: -2;
            opacity: 0.4;
        }

        .pixel-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: var(--black);
            border-bottom: 4px solid var(--wine-red);
            z-index: 10;
        }

        .player-info {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--gold-bg);
        }

        .headline-container {
            text-align: center;
            margin-top: 40px;
            z-index: 5;
        }

        h1.headline {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--white);
            text-shadow: 4px 4px 0px var(--maroon);
        }

        .menu-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: auto;
            padding: 0 40px;
            gap: 20px;
            scrollbar-width: none;
            z-index: 5;
        }

        .menu-container::-webkit-scrollbar { display: none; }

        .menu-card {
            min-width: 200px;
            height: 280px;
            background: var(--maroon);
            border: 4px solid var(--black);
            box-shadow: 8px 8px 0px 0px var(--wine-red);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            transition: 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            background: var(--wine-red);
            border-color: var(--white);
            box-shadow: 12px 12px 0px 0px var(--black);
        }

        .menu-card h2 {
            font-size: 0.7rem;
            color: var(--white);
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .menu-card p {
            font-size: 0.45rem;
            color: var(--gold-bg);
        }

        .footer-nav {
            padding: 25px 40px;
            display: flex;
            justify-content: flex-start;
            background: var(--black);
            z-index: 10;
        }

        .back-btn {
            text-decoration: none;
            color: var(--white);
            font-size: 0.7rem;
            padding: 10px 25px;
            border: 4px solid var(--white);
            background: transparent;
            box-shadow: 4px 4px 0px var(--wine-red);
            transition: 0.1s;
        }

        .back-btn:hover {
            background: var(--gold-bg);
            color: var(--black);
            box-shadow: 0px 0px 0px;
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body>

    <div class="pixel-bg"></div>
    <div class="pixel-grid"></div>

    <div class="hud-top">
        <div class="player-info">
            RAHMA OKTAVIA ALBAR
        </div>
        <div style="font-size: 0.6rem; color: #00ff00;">STATUS: ACTIVE</div>
    </div>

    <div class="headline-container">
        <h1 class="headline">Select Category</h1>
    </div>

    <div class="menu-container"> 
        <a href="about.html" class="menu-card">
            <h2>ABOUT ME</h2>
            <p>USER PROFILE</p>
        </a>

        <a href="#" class="menu-card">
            <h2>THE ENGINE</h2>
            <p>Data Science & Analytics</p>
        </a>

        <a href="creative.html" class="menu-card">
            <h2>CREATIVE</h2>
            <p>Innovation</p>
        </a>

        <a href="#" class="menu-card">
            <h2>SANDBOX</h2>
            <p>Exploration and Experiments</p>
        </a>

        <a href="#" class="menu-card">
            <h2>CONTACT</h2>
            <p>CONNECT</p>
        </a>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="back-btn">RETURN</a>
    </div>

</body>
</html>
