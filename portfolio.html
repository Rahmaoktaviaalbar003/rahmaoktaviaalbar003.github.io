<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Menu | Rahma Oktavia Albar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #19171b;
            --wine-red: #5d0018;
            --maroon: #800000;
            --gold-accent: #d29f22;
            --white: #ffffff;
            --gray-text: #94a3b8;
        }

        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .back-nav {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 60px;
            display: flex;
            justify-content: flex-start;
        }

        .back-link {
            text-decoration: none;
            color: var(--gold-accent);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border: 2px solid var(--gold-accent);
            padding: 10px 24px;
            transition: 0.3s ease;
            position: relative;
        }

        .back-link::after {
            content: '';
            position: absolute;
            bottom: -6px; right: -6px;
            width: 12px; height: 12px;
            background-color: var(--gold-accent);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
        }

        .back-link:hover {
            color: var(--white);
            background: var(--wine-red);
            border-color: var(--wine-red);
            box-shadow: 0 0 15px rgba(93, 0, 24, 0.5);
        }

        h1.headline {
            font-family: 'Poppins', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            font-weight: 700;
            margin: 0;
            text-align: center;
            line-height: 1.1;
            letter-spacing: 2px;
            color: var(--white);
            text-shadow: 2px 2px 0px var(--wine-red),
                         4px 4px 0px rgba(210, 159, 34, 0.2);
            position: relative;
        }

        h1.headline::before {
            content: 'SYSTEM ACCESS';
            display: block;
            font-family: 'Inter';
            font-size: 0.7rem;
            color: var(--gold-accent);
            letter-spacing: 5px;
            margin-bottom: 8px;
            font-weight: 400;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            margin-top: 70px;
        }

        .menu-card {
            background: rgba(128, 0, 0, 0.15);
            padding: 50px 30px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
            backdrop-filter: blur(5px);
            cursor: pointer;
            opacity: 0;
            animation: systemBoot 0.4s ease-out forwards;
        }

        .menu-card::after {
            content: '';
            position: absolute;
            bottom: 12px; right: 12px;
            width: 18px; height: 18px;
            background-color: var(--maroon);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
            opacity: 0.7;
            transition: 0.3s;
        }

        .menu-card:hover {
            transform: scale(1.02) translateY(-5px);
            border-color: var(--gold-accent);
            box-shadow: 0 15px 35px rgba(210, 159, 34, 0.15);
            background: linear-gradient(145deg, rgba(128, 0, 0, 0.2), rgba(93, 0, 24, 0.3));
        }

        .menu-card:hover::after {
            opacity: 1;
            background-color: var(--gold-accent);
        }

        .menu-card h2 {
            font-family: 'Poppins', sans-serif;
            color: var(--white);
            margin: 0;
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .menu-card p {
            color: var(--gray-text);
            margin: 8px 0 0 0;
            font-weight: 400;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .menu-card:hover h2 {
            color: var(--gold-accent);
            text-shadow: 0 0 10px rgba(210, 159, 34, 0.5);
        }

        .menu-card:hover p {
            color: var(--white);
        }

        @keyframes systemBoot {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-card:nth-child(1) { animation-delay: 0.1s; }
        .menu-card:nth-child(2) { animation-delay: 0.2s; }
        .menu-card:nth-child(3) { animation-delay: 0.3s; }
        .menu-card:nth-child(4) { animation-delay: 0.4s; }
        .menu-card:nth-child(5) { animation-delay: 0.5s; }

    </style>
</head>
<body>

    <div class="back-nav">
        <a href="index.html" class="back-link">SYSTEM RETURN</a>
    </div>

    <h1 class="headline">Select<br>Category</h1>

    <div class="menu-grid">
        <a href="#" class="menu-card">
            <div>
                <h2>About Me</h2>
                <p>My Digital Identity & Journey</p>
            </div>
        </a>

        <a href="#" class="menu-card">
            <div>
                <h2>The Engine Room</h2>
                <p>Data Science & Engineering</p>
            </div>
        </a>

        <a href="#" class="menu-card">
            <div>
                <h2>Creative Canvas</h2>
                <p>Innovation & Design</p>
            </div>
        </a>

        <a href="#" class="menu-card">
            <div>
                <h2>The Sandbox</h2>
                <p>Personal Projects</p>
            </div>
        </a>

        <a href="#" class="menu-card">
            <div>
                <h2>Contact Me</h2>
                <p>Connect & Collaborate</p>
            </div>
        </a>
    </div>

</body>
</html>
