<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Menu | Rahma Oktavia Albar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --wine-red: #5d0018;
            --maroon-core: #800000;
            --gold-accent: #d29f22;
            --gold-hover: #f1c40f;
            --bg-deep: #0a0e17;
            --card-bg: rgba(16, 23, 39, 0.7);
            --white-text: #ffffff;
            --gray-text: #94a3b8;
        }

        * {
            scroll-behavior: smooth;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 10% 20%, rgba(93, 0, 24, 0.15), transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(210, 159, 34, 0.05), transparent 30%);
            color: var(--white-text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        .system-nav {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 50px;
            display: flex;
            justify-content: flex-start;
        }

        .back-link {
            text-decoration: none;
            color: var(--gold-accent);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border: 2px solid var(--gold-accent);
            padding: 8px 20px;
            transition: 0.3s;
            position: relative;
        }

        .back-link::after {
            content: '';
            position: absolute;
            bottom: -5px; right: -5px;
            width: 10px; height: 10px;
            background-color: var(--gold-accent);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
        }

        .back-link:hover {
            color: var(--white-text);
            background: var(--wine-red);
            border-color: var(--wine-red);
            box-shadow: 0 0 15px rgba(93, 0, 24, 0.6);
        }

        h1.system-title {
            font-family: 'Poppins', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            font-weight: 800;
            margin: 0;
            text-align: center;
            line-height: 1.1;
            letter-spacing: 2px;
            color: var(--white-text);
            text-shadow: 2px 2px 0px var(--wine-red),
                         5px 5px 0px rgba(210, 159, 34, 0.2);
            position: relative;
        }

        h1.system-title::before {
            content: 'SYSTEM ACCESS';
            display: block;
            font-family: 'Inter';
            font-size: 0.7rem;
            color: var(--gold-accent);
            letter-spacing: 5px;
            margin-bottom: 5px;
            font-weight: 400;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            margin-top: 60px;
        }

        .menu-card {
            background: var(--card-bg);
            padding: 40px 30px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
            backdrop-filter: blur(5px);
            cursor: pointer;
            opacity: 0;
            animation: systemBoot 0.4s ease-out forwards;
        }

        .menu-card::after {
            content: '';
            position: absolute;
            bottom: 10px; right: 10px;
            width: 15px; height: 15px;
            background-color: var(--wine-red);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
            opacity: 0.5;
            transition: 0.3s;
        }

        .menu-card:hover {
            transform: scale(1.03) translateY(-5px);
            border-color: var(--gold-accent);
            box-shadow: 0 15px 35px rgba(210, 159, 34, 0.2),
                        inset 0 0 15px rgba(255, 255, 255, 0.05);
            background: linear-gradient(145deg, var(--card-bg), rgba(93, 0, 24, 0.4));
        }

        .menu-card:hover::after {
            opacity: 1;
            background-color: var(--gold-accent);
        }

        .menu-card h2 {
            font-family: 'Poppins', sans-serif;
            color: var(--white-text);
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .menu-card p {
            color: var(--gray-text);
            margin: 5px 0 0 0;
            font-weight: 400;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .menu-card:hover h2 {
            color: var(--gold-hover);
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        .menu-card:hover p {
            color: var(--white-text);
        }

        @keyframes systemBoot {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-card:nth-child(1) { animation-delay: 0.1s; }
        .menu-card:nth-child(2) { animation-delay: 0.2s; }
        .menu-card:nth-child(3) { animation-delay: 0.3s; }

    </style>
</head>
<body>

    <div class="system-nav">
        <a href="index.html" class="back-link">SYSTEM RETURN</a>
    </div>

    <h1 class="system-title">Select<br>Category</h1>

    <div class="menu-grid">
        <a href="#" class="menu-card">
            <div>
                <h2>The Engine Room</h2>
                <p>Data Science & Engineering</p>
            </div>
        </a>

        <a href="#" class="menu-card">
            <div>
                <h2>Creative Canvas</h2>
                <p>Innovation & Design</p>
            </div>
        </a>

        <a href="#" class="menu-card">
            <div>
                <h2>The Sandbox</h2>
                <p>Personal Projects</p>
            </div>
        </a>
    </div>

</body>
</html>
