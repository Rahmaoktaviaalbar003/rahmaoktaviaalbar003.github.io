<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Menu | Rahma Oktavia Albar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --wine-red: #5d0018;
            --maroon: #800000;
            --gold-accent: #d29f22;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- Game Animated Background --- */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(93, 0, 24, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(93, 0, 24, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
            z-index: -1;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 50px 50px; }
        }

        .bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 80vw; height: 80vh;
            background: radial-gradient(circle, rgba(128, 0, 0, 0.2) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -2;
        }

        /* --- UI Elements --- */
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--wine-red);
            z-index: 10;
        }

        .headline-container {
            text-align: center;
            margin-top: 40px;
            z-index: 5;
        }

        h1.headline {
            font-family: 'Poppins', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--white);
            text-shadow: 0 0 10px var(--wine-red), 3px 3px 0px var(--maroon), 6px 6px 0px rgba(210, 159, 34, 0.2);
        }

        .menu-container {
            flex: 1;
            display: flex;
            align-items: center;
            overflow-x: auto;
            padding: 0 60px;
            gap: 25px;
            scrollbar-width: none;
            z-index: 5;
        }

        .menu-container::-webkit-scrollbar { display: none; }

        .menu-card {
            min-width: 240px;
            height: 360px;
            background: rgba(128, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
            transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            cursor: pointer;
            text-decoration: none;
            backdrop-filter: blur(15px);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 85% 100%, 0 100%);
        }

        .menu-card:hover {
            transform: scale(1.08) translateY(-10px);
            border-color: var(--gold-accent);
            background: linear-gradient(to top, rgba(128, 0, 0, 0.6), transparent);
            box-shadow: 0 0 30px rgba(210, 159, 34, 0.3);
        }

        .menu-card::before {
            content: attr(data-number);
            position: absolute;
            top: 15px; left: 15px;
            font-family: 'Poppins';
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.05);
            font-weight: 900;
        }

        .menu-card h2 {
            font-family: 'Poppins';
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .menu-card p {
            color: var(--gold-accent);
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .footer-nav {
            padding: 30px 40px;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10;
        }

        .back-btn {
            text-decoration: none;
            color: var(--white);
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
            padding: 10px 30px;
            border: 2px solid var(--white);
            transition: 0.3s;
            position: relative;
        }

        .back-btn:hover {
            background: var(--gold-accent);
            border-color: var(--gold-accent);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--gold-accent);
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="bg-glow"></div>

    <div class="hud-top">
        <div style="border-left: 4px solid var(--gold-accent); padding-left: 15px;">
            <span style="letter-spacing: 3px; font-weight: 700;">RAHMA OKTAVIA ALBAR</span>
        </div>
        <div style="color: var(--gold-accent); font-weight: bold; font-size: 0.8rem; text-shadow: 0 0 5px var(--gold-accent);">
            CONNECTION: STABLE
        </div>
    </div>

    <div class="headline-container">
        <h1 class="headline">Select Category</h1>
    </div>

    <div class="menu-container">
        <a href="#" class="menu-card" data-number="01">
            <h2>About Me</h2>
            <p>User Identity</p>
        </a>
        <a href="#" class="menu-card" data-number="02">
            <h2>The Engine</h2>
            <p>Data Science Skills</p>
        </a>
        <a href="#" class="menu-card" data-number="03">
            <h2>Creative</h2>
            <p>Design & Innovation</p>
        </a>
        <a href="#" class="menu-card" data-number="04">
            <h2>Sandbox</h2>
            <p>Personal Projects</p>
        </a>
        <a href="#" class="menu-card" data-number="05">
            <h2>Contact</h2>
            <p>Reach Out</p>
        </a>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="back-btn">[ ESC ] RETURN</a>
    </div>

</body>
</html>
