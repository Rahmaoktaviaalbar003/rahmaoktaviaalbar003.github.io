<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Menu | Rahma Oktavia Albar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #19171b;
            --wine-red: #5d0018;
            --maroon: #800000;
            --gold-accent: #d29f22;
            --white: #ffffff;
            --gray-text: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            border-bottom: 1px solid var(--wine-red);
        }

        .player-info {
            display: flex;
            align-items: center;
        }

        .headline-container {
            text-align: center;
            margin-top: 30px;
        }

        h1.headline {
            font-family: 'Poppins', sans-serif;
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px var(--wine-red), 4px 4px 0px rgba(210, 159, 34, 0.2);
        }

        .menu-container {
            flex: 1;
            display: flex;
            align-items: center;
            overflow-x: auto;
            padding: 0 40px;
            gap: 20px;
            scrollbar-width: none;
        }

        .menu-container::-webkit-scrollbar { display: none; }

        .menu-card {
            min-width: 220px;
            height: 320px;
            background: rgba(128, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            cursor: pointer;
            text-decoration: none;
            backdrop-filter: blur(8px);
        }

        .menu-card:hover {
            transform: scale(1.05);
            border-color: var(--gold-accent);
            background: linear-gradient(to top, rgba(93, 0, 24, 0.5), transparent);
            box-shadow: 0 0 20px rgba(210, 159, 34, 0.15);
        }

        .menu-card::before {
            content: attr(data-number);
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: 'Poppins';
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.04);
            font-weight: 900;
        }

        .menu-card h2 {
            font-family: 'Poppins';
            color: var(--white);
            font-size: 1.4rem;
            text-transform: uppercase;
            margin-bottom: 3px;
            z-index: 1;
        }

        .menu-card p {
            color: var(--gold-accent);
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 1;
        }

        .corner {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 30px;
            height: 30px;
            background: var(--wine-red);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
        }

        .menu-card:hover .corner {
            background: var(--gold-accent);
        }

        .footer-nav {
            padding: 25px 40px;
            display: flex;
            justify-content: flex-start;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .back-btn {
            text-decoration: none;
            color: var(--white);
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
            padding: 8px 25px;
            border: 1px solid var(--white);
            transition: 0.2s;
        }

        .back-btn:hover {
            background: var(--white);
            color: var(--bg-dark);
        }

    </style>
</head>
<body>

    <div class="hud-top">
        <div class="player-info">
            <span style="letter-spacing: 2px; font-weight: 600; font-size: 0.9rem; border-left: 3px solid var(--gold-accent); padding-left: 10px;">RAHMA OKTAVIA ALBAR</span>
        </div>
        <div style="color: var(--gold-accent); font-weight: bold; font-size: 0.8rem;">SYSTEM STATUS: ACTIVE</div>
    </div>

    <div class="headline-container">
        <h1 class="headline">Select Category</h1>
    </div>

    <div class="menu-container">
        <a href="#" class="menu-card" data-number="01">
            <div class="corner"></div>
            <h2>About Me</h2>
            <p>User Identity</p>
        </a>

        <a href="#" class="menu-card" data-number="02">
            <div class="corner"></div>
            <h2>The Engine</h2>
            <p>Data Skills</p>
        </a>

        <a href="#" class="menu-card" data-number="03">
            <div class="corner"></div>
            <h2>Creative</h2>
            <p>Design Lab</p>
        </a>

        <a href="#" class="menu-card" data-number="04">
            <div class="corner"></div>
            <h2>Sandbox</h2>
            <p>Experimental</p>
        </a>

        <a href="#" class="menu-card" data-number="05">
            <div class="corner"></div>
            <h2>Contact</h2>
            <p>Connection</p>
        </a>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="back-btn">[ ESC ] RETURN</a>
    </div>

</body>
</html>
