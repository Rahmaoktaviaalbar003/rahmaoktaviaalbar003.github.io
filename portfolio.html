<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Menu | Rahma Oktavia Albar</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --wine-red: #5d0018;
            --maroon: #800000;
            --gold-accent: #d29f22;
            --white: #ffffff;
            --bg-dark: #0a0a0c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            image-rendering: pixelated;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-dark);
            /* Background Gambar Taman Pixel Art */
            background-image: url('https://images.squarespace-cdn.com/content/v1/5e8fb706229986344ad93d82/1591745719943-YV6G6X8Z7V1Z1YV6G6X8/Pixel+Art+Garden.png?format=2500w');
            background-size: cover;
            background-position: center;
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Overlay agar teks tetap terbaca */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 4px solid var(--wine-red);
            z-index: 10;
        }

        .player-info {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--gold-accent);
        }

        .headline-container {
            text-align: center;
            margin-top: 40px;
            z-index: 5;
        }

        h1.headline {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--white);
            text-shadow: 4px 4px 0px var(--wine-red);
        }

        .menu-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: auto;
            padding: 0 40px;
            gap: 20px;
            scrollbar-width: none;
            z-index: 5;
        }

        .menu-container::-webkit-scrollbar { display: none; }

        .menu-card {
            min-width: 200px;
            height: 280px;
            background: var(--maroon);
            border: 4px solid #000;
            /* Shadow kotak ala foto referensi */
            box-shadow: 8px 8px 0px 0px var(--wine-red);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            transition: 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            background: var(--gold-accent);
            box-shadow: 12px 12px 0px 0px var(--white);
        }

        .menu-card h2 {
            font-size: 0.7rem;
            color: var(--white);
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .menu-card p {
            font-size: 0.45rem;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Press Start 2P', cursive;
        }

        .menu-card:hover h2, .menu-card:hover p {
            color: #000;
        }

        .footer-nav {
            padding: 25px 40px;
            display: flex;
            justify-content: flex-start;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .back-btn {
            text-decoration: none;
            color: var(--white);
            font-size: 0.7rem;
            padding: 10px 25px;
            border: 4px solid var(--white);
            background: transparent;
            box-shadow: 4px 4px 0px var(--wine-red);
            transition: 0.1s;
        }

        .back-btn:hover {
            background: var(--gold-accent);
            color: #000;
            box-shadow: 0px 0px 0px;
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body>

    <div class="hud-top">
        <div class="player-info">
            RAHMA OKTAVIA ALBAR
        </div>
        <div style="font-size: 0.6rem; color: #00ff00;">STATUS: ACTIVE</div>
    </div>

    <div class="headline-container">
        <h1 class="headline">Select Category</h1>
    </div>

    <div class="menu-container">
        <a href="#" class="menu-card">
            <h2>ABOUT_ME</h2>
            <p>USER PROFILE</p>
        </a>

        <a href="#" class="menu-card">
            <h2>THE_ENGINE</h2>
            <p>DATA SKILLS</p>
        </a>

        <a href="#" class="menu-card">
            <h2>CREATIVE</h2>
            <p>DESIGN LAB</p>
        </a>

        <a href="#" class="menu-card">
            <h2>SANDBOX</h2>
            <p>FUN PROJ</p>
        </a>

        <a href="#" class="menu-card">
            <h2>CONTACT</h2>
            <p>CONNECT</p>
        </a>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="back-btn">RETURN</a>
    </div>

</body>
</html>
