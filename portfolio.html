<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Menu | Rahma Oktavia Albar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #19171b;
            --wine-red: #5d0018;
            --maroon: #800000;
            --gold-accent: #d29f22;
            --white: #ffffff;
            --gray-text: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Supaya terasa seperti layar game */
        }

        /* Top Status Bar ala Game HUD */
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            border-bottom: 2px solid var(--wine-red);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .level-badge {
            background: var(--gold-accent);
            color: var(--bg-dark);
            padding: 2px 10px;
            font-weight: 800;
            font-size: 0.8rem;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        /* Headline Solo Leveling Style */
        .headline-container {
            text-align: center;
            margin-top: 40px;
        }

        h1.headline {
            font-family: 'Poppins', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px var(--wine-red), 6px 6px 0px rgba(210, 159, 34, 0.2);
        }

        /* Horizontal Menu Layout 2D */
        .menu-container {
            flex: 1;
            display: flex;
            align-items: center;
            overflow-x: auto;
            padding: 0 50px;
            gap: 30px;
            scrollbar-width: none; /* Hide scrollbar for clean look */
        }

        .menu-container::-webkit-scrollbar { display: none; }

        .menu-card {
            min-width: 300px;
            height: 400px;
            background: rgba(128, 0, 0, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            cursor: pointer;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }

        /* Border Glow Effect */
        .menu-card:hover {
            transform: scale(1.05);
            border-color: var(--gold-accent);
            background: linear-gradient(to top, rgba(93, 0, 24, 0.6), transparent);
            box-shadow: 0 0 30px rgba(210, 159, 34, 0.1);
        }

        /* Nomor Menu ala Game */
        .menu-card::before {
            content: attr(data-number);
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: 'Poppins';
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.05);
            font-weight: 900;
        }

        .menu-card h2 {
            font-family: 'Poppins';
            color: var(--white);
            font-size: 1.8rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            z-index: 1;
        }

        .menu-card p {
            color: var(--gold-accent);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 1;
        }

        /* Corner Accent */
        .corner {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 40px;
            height: 40px;
            background: var(--wine-red);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
        }

        .menu-card:hover .corner {
            background: var(--gold-accent);
        }

        /* Bottom Navigation Bar */
        .footer-nav {
            padding: 30px 50px;
            display: flex;
            justify-content: flex-start;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .back-btn {
            text-decoration: none;
            color: var(--white);
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            padding: 10px 30px;
            border: 2px solid var(--white);
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--white);
            color: var(--bg-dark);
        }

    </style>
</head>
<body>

    <div class="hud-top">
        <div class="player-info">
            <div class="level-badge">LV. 23</div>
            <span style="letter-spacing: 2px; font-weight: 600;">RAHMA OKTAVIA ALBAR</span>
        </div>
        <div style="color: var(--gold-accent); font-weight: bold;">SYSTEM STATUS: ACTIVE</div>
    </div>

    <div class="headline-container">
        <h1 class="headline">Select Category</h1>
    </div>

    <div class="menu-container">
        <a href="#" class="menu-card" data-number="01">
            <div class="corner"></div>
            <h2>About Me</h2>
            <p>User Profile & Identity</p>
        </a>

        <a href="#" class="menu-card" data-number="02">
            <div class="corner"></div>
            <h2>The Engine Room</h2>
            <p>Data Science Skills</p>
        </a>

        <a href="#" class="menu-card" data-number="03">
            <div class="corner"></div>
            <h2>Creative Canvas</h2>
            <p>Design & Innovation</p>
        </a>

        <a href="#" class="menu-card" data-number="04">
            <div class="corner"></div>
            <h2>The Sandbox</h2>
            <p>Experimental Lab</p>
        </a>

        <a href="#" class="menu-card" data-number="05">
            <div class="corner"></div>
            <h2>Contact Me</h2>
            <p>Establish Connection</p>
        </a>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="back-btn">[ ESC ] RETURN</a>
    </div>

</body>
</html>
