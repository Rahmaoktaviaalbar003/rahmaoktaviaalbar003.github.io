<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahma Oktavia Albar | Pixel Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-bg: #d29f22;
            --gold-dark: #b8860b;
            --wine-red: #5d0018;
            --maroon: #800000;
            --black: #000000;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated; 
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--gold-bg);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .pixel-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(45deg, var(--gold-dark) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--gold-dark) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--gold-dark) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--gold-dark) 75%);
            background-size: 40px 40px;
            z-index: -2;
            opacity: 0.4;
        }

        .pixel-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: var(--black);
            border-bottom: 4px solid var(--wine-red);
            z-index: 10;
        }

        .player-info {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--gold-bg);
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .container {
            text-align: center;
            max-width: 900px;
            padding: 20px;
        }

        /* FOTO PROFIL BULAT */
        .profile-img {
            width: 150px;
            height: 150px;
            border: 5px solid var(--black);
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(128, 0, 0, 0.6);
            display: inline-block;
        }

        .header-label {
            color: var(--maroon);
            font-size: 0.6rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #ffffff;
            text-shadow: 5px 5px 0px var(--maroon);
        }

        .tagline {
            background: rgba(0, 0, 0, 0.1);
            border-left: 6px solid var(--maroon);
            padding: 15px;
            font-size: 0.55rem;
            color: var(--wine-red);
            margin: 20px auto;
            max-width: 700px;
            line-height: 2;
            text-align: left;
        }

        .btn-group {
            margin-top: 40px;
        }

        .btn {
            text-decoration: none;
            padding: 15px 30px;
            font-size: 0.7rem;
            transition: 0.2s;
            display: inline-block;
            border: 4px solid var(--black);
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--maroon);
            color: white;
            box-shadow: 6px 6px 0px var(--wine-red);
        }

        .btn-primary:hover {
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0px var(--white);
            background-color: var(--wine-red);
        }

        .footer-nav {
            padding: 20px 40px;
            background: var(--black);
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="pixel-bg"></div>
    <div class="pixel-grid"></div>

    <header class="hud-top">
        <div class="player-info">RAHMA_OKTAVIA_ALBAR</div>
        <div class="player-info" style="color: var(--white);">[HOME]</div>
    </header>

    <main class="main-wrapper">
        <div class="container" style="animation: fadeIn 1.5s ease-out;">
            <img src="rahmaphoto.jpeg" alt="Rahma" class="profile-img">
            
            <p class="header-label">DIGITAL_PROJECTS_PORTFOLIO</p>
            
            <h1>RAHMA OKTAVIA<br>ALBAR</h1>
            
            <div class="tagline">
                "MENGUBAH DATA MENJADI INSIGHT DAN IDE MENJADI SOLUSI DIGITAL."
            </div>

            <div class="btn-group">
                <a href="portfolio.html" class="btn btn-primary">LIHAT PROYEK SAYA</a>
            </div>
        </div>
    </main>

    <footer class="footer-nav"></footer>

</body>
</html>
