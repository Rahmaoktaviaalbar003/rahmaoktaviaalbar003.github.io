<!DOCTYPE html>

<title>Rahma Oktavia Albar | My Digital Projects Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@600&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

:root {
    --primary-red: #D32F2F;
    --bg-dark: #0f172a;
    --text-light: #f8fafc;
    --accent-gray: #94a3b8;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-light);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    text-align: center;
    max-width: 800px;
    padding: 20px;
    animation: fadeIn 1.5s ease-out;
}

.profile-img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 3px solid var(--primary-red);
    object-fit: cover;
    margin-bottom: 20px;
    box-shadow: 0 0 20px rgba(211, 47, 47, 0.3);
}

h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 3rem;
    margin-bottom: 0.5rem;
    letter-spacing: -1px;
    color: #ffffff;
}

.tagline {
    border-left: 4px solid var(--primary-red);
    padding-left: 15px;
    font-style: italic;
    color: #cbd5e1;
    margin: 20px auto;
    max-width: 500px;
}

/* PIXEL MENU */

.pixel-menu {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.pixel-btn {
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    text-decoration: none;
    color: white;
    padding: 14px 22px;
    background: #111827;
    border: 3px solid var(--primary-red);
    box-shadow: 4px 4px 0px var(--primary-red);
    transition: all 0.15s ease;
}

.pixel-btn:hover {
    transform: translate(4px,4px);
    box-shadow: none;
    background: var(--primary-red);
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>
