<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahma Oktavia Albar | My Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-bg: #d29f22;
            --gold-dark: #b8860b;
            --wine-red: #5d0018;
            --maroon: #800000;
            --black: #000000;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated; 
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--gold-bg);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Background Pixel Gold */
        .pixel-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(45deg, var(--gold-dark) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--gold-dark) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--gold-dark) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--gold-dark) 75%);
            background-size: 40px 40px;
            z-index: -2;
            opacity: 0.4;
        }

        .pixel-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        /* HUD TOP */
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: var(--black);
            border-bottom: 4px solid var(--wine-red);
            z-index: 10;
        }

        .player-info {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--gold-bg);
        }

        /* Layout Utama dengan Foto di Samping */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5%;
            z-index: 5;
            position: relative;
        }

        .text-section {
            flex: 1;
            text-align: center;
            padding-right: 50px;
        }

        .image-section {
            flex: 1;
            display: flex;
            justify-content: flex-start;
            height: 100%;
            align-items: flex-end;
        }

        .image-section img {
            max-height: 90%;
            object-fit: contain;
        }

        .header-label {
            color: var(--maroon);
            font-size: 0.6rem;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            line-height: 1.8;
            color: #ffffff;
            text-shadow: 5px 5px 0px var(--maroon);
        }

        .tagline {
            background: rgba(0, 0, 0, 0.1);
            border-left: 6px solid var(--maroon);
            padding: 15px;
            font-size: 0.55rem;
            color: var(--wine-red);
            margin: 20px auto;
            max-width: 600px;
            line-height: 2;
            text-align: left;
        }

        .btn-primary {
            text-decoration: none;
            padding: 15px 30px;
            font-size: 0.7rem;
            display: inline-block;
            border: 4px solid var(--black);
            background-color: var(--maroon);
            color: white;
            box-shadow: 6px 6px 0px var(--wine-red);
            margin-top: 30px;
            transition: 0.2s;
        }

        .btn-primary:hover {
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0px var(--white);
        }

        /* FOOTER */
        .footer-nav {
            height: 40px;
            background: var(--black);
            z-index: 10;
        }

        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .image-section { display: none; }
            .text-section { padding-right: 0; }
        }
    </style>
</head>
<body>

    <div class="pixel-bg"></div>
    <div class="pixel-grid"></div>

    <header class="hud-top">
        <div class="player-info">RAHMA_OKTAVIA_ALBAR</div>
        <div class="player-info" style="color: var(--white);">[HOME]</div>
    </header>

    <main class="main-content">
        <div class="text-section">
            <p class="header-label">DIGITAL_PROJECTS_PORTFOLIO</p>
            <h1>RAHMA OKTAVIA<br>ALBAR</h1>
            
            <div class="tagline">
                "MENGUBAH DATA MENJADI INSIGHT DAN IDE MENJADI SOLUSI DIGITAL."
            </div>

            <a href="portfolio.html" class="btn-primary">LIHAT PROYEK SAYA</a>
        </div>

        <div class="image-section">
            <img src="rahmaphoto.jpeg" alt="Rahma">
        </div>
    </main>

    <footer class="footer-nav"></footer>

</body>
</html>
